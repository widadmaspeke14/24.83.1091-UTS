<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kopi Senja - Sign In | Masuk</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .signin-section {
            background: linear-gradient(rgba(252,248,242,0.8), rgba(252,248,242,0.9)), url('img/form_bg.png') no-repeat center center/cover;
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .form-box {
            background: var(--white);
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .form-box h2 {
            margin-bottom: 30px;
            color: var(--primary-color);
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo">Kopi<span>Senja</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="signin.html" class="active">Sign In</a></li>
            <li><a href="signup.html">Sign Up</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <section class="signin-section">
            <div class="form-box">
                <h2>Masuk Ke Akun Anda</h2>
                <form action="#">
                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Masukkan Email Anda" required>
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Masukkan Password Anda" required>
                    </div>
                    <button type="submit" class="btn" style="width: 100%;">Masuk Sekarang</button>
                </form>
                <p style="margin-top: 20px; font-size: 14px;">Belum punya akun? <a href="signup.html" style="color: var(--accent-color); font-weight: 600;">Daftar di sini</a></p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Kopi Senja. All Rights Reserved.</p>
    </footer>

</body>
</html>
